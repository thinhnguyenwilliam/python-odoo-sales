name: Odoo CI — Lint & Test

on:
  push:
    branches: [main, develop, 'feature/**', 'hotfix/**']
  pull_request:
    branches: [main, develop]

env:
  PYTHON_VERSION: '3.10'

jobs:
  # ──────────────────────────────────────────────────────────────
  # Job 1: Code Quality
  # ──────────────────────────────────────────────────────────────
  lint:
    name: 🔍 Code Quality
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install lint tools
        run: |
          pip install pylint flake8 isort black bandit

      - name: Flake8 — Style check
        run: |
          flake8 custom_addons/ \
            --max-line-length=120 \
            --exclude=__pycache__,*.pyc \
            --extend-ignore=E203,W503

      - name: isort — Import order
        run: isort --check-only custom_addons/

      - name: Bandit — Security scan
        run: |
          bandit -r custom_addons/ \
            --severity-level medium \
            --confidence-level medium \
            -f txt

      - name: Check XML syntax
        run: |
          find custom_addons -name "*.xml" -exec xmllint --noout {} \;

  # ──────────────────────────────────────────────────────────────
  # Job 2: Docker Build Test
  # ──────────────────────────────────────────────────────────────
  docker-build:
    name: 🐳 Docker Build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Create .env
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME_strong_db_password_2024!/TestPass123!/g' .env
          sed -i 's/CHANGE_ME_strong_redis_password_2024!/TestPass123!/g' .env
          sed -i 's/CHANGE_ME_master_password_2024!/TestPass123!/g' .env

      - name: Generate SSL cert
        run: |
          mkdir -p nginx/ssl
          openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
            -keyout nginx/ssl/privkey.pem \
            -out nginx/ssl/fullchain.pem \
            -subj "/CN=localhost"

      - name: Start stack
        run: docker compose up -d --wait --wait-timeout 120

      - name: Check services healthy
        run: docker compose ps

      - name: Test Odoo health endpoint
        run: |
          docker compose exec -T odoo curl -sf http://localhost:8069/web/health

      - name: Stop stack
        if: always()
        run: docker compose down -v

  # ──────────────────────────────────────────────────────────────
  # Job 3: Odoo Unit Tests
  # ──────────────────────────────────────────────────────────────
  odoo-tests:
    name: 🧪 Odoo Unit Tests
    runs-on: ubuntu-latest
    needs: docker-build
    steps:
      - uses: actions/checkout@v4

      - name: Setup environment
        run: |
          cp .env.example .env
          sed -i 's/CHANGE_ME_strong_db_password_2024!/TestPass123!/g' .env
          sed -i 's/CHANGE_ME_strong_redis_password_2024!/TestPass123!/g' .env
          sed -i 's/CHANGE_ME_master_password_2024!/TestPass123!/g' .env
          mkdir -p nginx/ssl logs/odoo
          openssl req -x509 -newkey rsa:2048 -sha256 -days 365 -nodes \
            -keyout nginx/ssl/privkey.pem -out nginx/ssl/fullchain.pem \
            -subj "/CN=localhost"

      - name: Start DB and Odoo
        run: |
          docker compose up -d db redis
          sleep 20
          docker compose up -d odoo
          sleep 60

      - name: Init test database
        run: |
          docker compose exec -T odoo odoo -d test_ci_db -i base \
            --stop-after-init --without-demo=all

      - name: Run unit tests
        run: |
          docker compose exec -T odoo odoo -d test_ci_db \
            --test-enable --stop-after-init \
            -i sale_management_custom \
            2>&1 | tee test_output.log
          # Fail nếu có test error
          grep -q "ERROR\|FAILED" test_output.log && exit 1 || exit 0

      - name: Upload test logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-logs
          path: test_output.log

      - name: Cleanup
        if: always()
        run: docker compose down -v
