###############################################################
#  ODOO 17 — Production Stack                                  #
#  Network : odoo_net                                          #
#  Services: db · redis · odoo · nginx                         #
#            prometheus · grafana · postgres_exporter          #
#            redis_exporter · node_exporter · backup           #
###############################################################

networks:
  odoo_net:
    driver: bridge
    name: odoo_net          # explicit tên network

volumes:
  odoo_db_data:
    name: odoo_db_data
  odoo_filestore:
    name: odoo_filestore
  odoo_sessions:
    name: odoo_sessions
  redis_data:
    name: redis_data
  nginx_logs:
    name: nginx_logs
  prometheus_data:
    name: prometheus_data
  grafana_data:
    name: grafana_data

services:

  # ─────────────────────────────────────────────
  # PostgreSQL 15
  # ─────────────────────────────────────────────
  db:
    image: postgres:15-alpine
    container_name: odoo_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-odoo}
      POSTGRES_USER: ${POSTGRES_USER:-odoo}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-odoo_secure_pass}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --lc-collate=C --lc-ctype=C"
    volumes:
      - odoo_db_data:/var/lib/postgresql/data
      - ./scripts/init-db.sh:/docker-entrypoint-initdb.d/init-db.sh:ro
    networks:
      - odoo_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-odoo} -d ${POSTGRES_DB:-odoo}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    expose:
      - "5432"
    shm_size: "256m"
    # Security hardening
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Redis — session store / cache
  # ─────────────────────────────────────────────
  redis:
    image: redis:7-alpine
    container_name: odoo_redis
    restart: unless-stopped
    command: >
      redis-server
      --requirepass ${REDIS_PASSWORD:-redis_secure_pass}
      --maxmemory 256mb
      --maxmemory-policy allkeys-lru
      --save 900 1
      --save 300 10
    volumes:
      - redis_data:/data
    networks:
      - odoo_net
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-redis_secure_pass}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Odoo 17 Community
  # ─────────────────────────────────────────────
  odoo:
    image: odoo:17.0
    container_name: odoo_app
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    environment:
      HOST: db
      PORT: 5432
      USER: ${POSTGRES_USER:-odoo}
      PASSWORD: ${POSTGRES_PASSWORD:-odoo_secure_pass}
    volumes:
      - odoo_filestore:/var/lib/odoo
      - ./config/odoo.conf:/etc/odoo/odoo.conf:ro
      - ./custom_addons:/mnt/extra-addons:ro
      - ./logs/odoo:/var/log/odoo
    networks:
      - odoo_net
    expose:
      - "8069"
      - "8072"
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8069/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
    deploy:
      resources:
        limits:
          memory: 2G
          cpus: "2.0"
        reservations:
          memory: 512M
    security_opt:
      - no-new-privileges:true
    ulimits:
      nofile:
        soft: 65536
        hard: 65536

  # ─────────────────────────────────────────────
  # Nginx — Reverse Proxy + SSL termination
  # ─────────────────────────────────────────────
  nginx:
    image: nginx:1.25-alpine
    container_name: odoo_nginx
    restart: unless-stopped
    depends_on:
      odoo:
        condition: service_healthy
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - ./nginx/ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx
    networks:
      - odoo_net
    healthcheck:
      test: ["CMD-SHELL", "nginx -t && curl -sf http://localhost/web/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Prometheus — Metrics collection
  # ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:latest
    container_name: odoo_prometheus
    restart: unless-stopped
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alerts:/etc/prometheus/alerts:ro
      - prometheus_data:/prometheus
    networks:
      - odoo_net
    ports:
      - "9090:9090"
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Grafana — Dashboard & Visualization
  # ─────────────────────────────────────────────
  grafana:
    image: grafana/grafana:latest
    container_name: odoo_grafana
    restart: unless-stopped
    depends_on:
      - prometheus
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER:-admin}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-grafana_secure_pass}
      GF_SERVER_ROOT_URL: https://${DOMAIN:-localhost}/grafana
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_ANALYTICS_REPORTING_ENABLED: "false"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
    networks:
      - odoo_net
    ports:
      - "3000:3000"
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # PostgreSQL Exporter — Metrics cho Prometheus
  # ─────────────────────────────────────────────
  postgres_exporter:
    image: prometheuscommunity/postgres-exporter:latest
    container_name: odoo_pg_exporter
    restart: unless-stopped
    environment:
      DATA_SOURCE_NAME: "postgresql://${POSTGRES_USER:-odoo}:${POSTGRES_PASSWORD:-odoo_secure_pass}@db:5432/${POSTGRES_DB:-odoo}?sslmode=disable"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - odoo_net
    expose:
      - "9187"
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Redis Exporter — Metrics cho Prometheus
  # ─────────────────────────────────────────────
  redis_exporter:
    image: oliver006/redis_exporter:latest
    container_name: odoo_redis_exporter
    restart: unless-stopped
    environment:
      REDIS_ADDR: "redis://redis:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-redis_secure_pass}
    depends_on:
      redis:
        condition: service_healthy
    networks:
      - odoo_net
    expose:
      - "9121"
    security_opt:
      - no-new-privileges:true

  # ─────────────────────────────────────────────
  # Node Exporter — Host CPU/RAM/Disk metrics
  # ─────────────────────────────────────────────
  node_exporter:
    image: prom/node-exporter:latest
    container_name: odoo_node_exporter
    restart: unless-stopped
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - odoo_net
    expose:
      - "9100"
    security_opt:
      - no-new-privileges:true
