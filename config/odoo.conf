[options]
; ─────────────────────────────────────────────────────
;  Odoo 17 — Production Configuration
; ─────────────────────────────────────────────────────

; ── Database ──────────────────────────────────────────
db_host = db
db_port = 5432
db_name = odoo_prod
db_user = odoo
db_password = Odoo@Secure2024!
db_maxconn = 64

; ── Admin & Security ──────────────────────────────────
admin_passwd = Admin@Master2024!
; Chặn tạo DB mới / xóa DB từ web UI trong production
list_db = False

; ── Paths ─────────────────────────────────────────────
addons_path = /usr/lib/python3/dist-packages/odoo/addons,/mnt/extra-addons
data_dir = /var/lib/odoo

; ── HTTP / Longpolling ────────────────────────────────
http_interface = 0.0.0.0
http_port = 8069
longpolling_port = 8072
; proxy_mode = True  → bật khi đứng sau Nginx reverse proxy
proxy_mode = False

; ── Workers ───────────────────────────────────────────
; workers = 0  → threaded mode (dev/test)
; workers = 4  → multi-process (production: CPU*2+1)
workers = 0
max_cron_threads = 1

; ── Resource Limits ───────────────────────────────────
; 2.5 GB hard limit
limit_memory_hard = 2684354560
; 2 GB soft limit
limit_memory_soft = 2147483648
limit_request = 8192
limit_time_cpu = 600
limit_time_real = 1200
limit_time_real_cron = 1800

; ── Logging ───────────────────────────────────────────
logfile = /var/log/odoo/odoo.log
log_level = info
log_handler = :INFO,werkzeug:WARNING
logrotate = True

; ── Email (SMTP) ──────────────────────────────────────
; smtp_server = smtp.gmail.com
; smtp_port   = 587
; smtp_ssl    = False
; smtp_user   = your@email.com
; smtp_password = your_smtp_password
