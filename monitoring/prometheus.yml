global:
  scrape_interval: 15s
  evaluation_interval: 15s

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

rule_files:
  - 'alerts/*.yml'

scrape_configs:
  # ── PostgreSQL ─────────────────────────────────────────────────
  - job_name: 'postgres'
    static_configs:
      - targets: ['postgres_exporter:9187']
    metrics_path: /metrics

  # ── Redis ─────────────────────────────────────────────────────
  - job_name: 'redis'
    static_configs:
      - targets: ['redis_exporter:9121']

  # ── Nginx ─────────────────────────────────────────────────────
  - job_name: 'nginx'
    static_configs:
      - targets: ['nginx_exporter:9113']

  # ── Node Exporter (Host CPU/RAM/Disk) ─────────────────────────
  - job_name: 'node'
    static_configs:
      - targets: ['node_exporter:9100']

  # ── Prometheus tự giám sát ────────────────────────────────────
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']
