user nginx;
worker_processes auto;
pid /var/run/nginx.pid;
error_log /var/log/nginx/error.log warn;

events {
    worker_connections 1024;
    use epoll;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ── Logging ──────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] '
                    '"$request" $status $body_bytes_sent '
                    '"$http_referer" "$http_user_agent" '
                    'rt=$request_time uct=$upstream_connect_time '
                    'uht=$upstream_header_time urt=$upstream_response_time';

    access_log /var/log/nginx/access.log main;

    # ── Performance ───────────────────────────────────
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 65;
    types_hash_max_size 2048;
    server_tokens off;

    # ── Gzip ─────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/json application/javascript application/xml
        application/rss+xml application/atom+xml image/svg+xml;

    # ── Limits ───────────────────────────────────────
    client_max_body_size 200m;
    client_body_timeout 120s;
    client_header_timeout 60s;

    # ── Rate limiting ─────────────────────────────────
    limit_req_zone $binary_remote_addr zone=odoo_login:10m rate=5r/m;
    limit_req_zone $binary_remote_addr zone=odoo_general:10m rate=30r/s;

    # ── Upstream Odoo ─────────────────────────────────
    upstream odoo_backend {
        server odoo:8069 weight=1 fail_timeout=10s;
        keepalive 32;
    }

    upstream odoo_longpolling {
        server odoo:8072 weight=1 fail_timeout=10s;
    }

    include /etc/nginx/conf.d/*.conf;
}
